<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Clever | Portal</title>

    <style type="text/css">
        /* 1. RESET & THEME */
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            background-color: #000000 !important;
            font-family: Arial, sans-serif;
        }

        /* 2. THE TOP BAR - PURE WHITE */
        #topbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 60px !important;
            background-color: #ffffff !important; 
            background: #ffffff !important;
            display: flex !important;
            align-items: center !important;
            padding: 0 15px !important;
            z-index: 999999 !important; 
            box-sizing: border-box !important;
            border: none !important;
        }

        #topbar img {
            height: 40px !important;
            margin-right: 12px !important;
        }

        #topbar a {
            color: #000000 !important;
            text-decoration: none !important;
            font-size: 20px !important;
            font-weight: 500 !important;
        }

        /* 3. GAME AREA SETUP */
        #game-container {
            position: absolute !important;
            top: 60px !important;
            left: 0 !important;
            width: 100% !important;
            height: calc(100% - 60px) !important;
            background: #000 !important;
        }

        #game-area {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }

        .fs-button {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="topbar">
        <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
        <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
    </div>

    <div id="game-container">
        <div class="controls">
            <button class="fs-button" onclick="open_fullscreen()">⛶ Fullscreen</button>
        </div>

        <iframe 
            id="game-area" 
            src="https://class811.github.io/g2/blocky-cars" 
            scrolling="no" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>

    <script type="text/javascript">
        function open_fullscreen() {
            var elem = document.getElementById("game-area");
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // Focus the iframe on click to ensure mouse capture works
        window.addEventListener('mousedown', function() {
            document.getElementById('game-area').focus();
        });
    </script>
</body>
</html>
